[project]
name = "nfp-lookups"
version = "0.1.0"
description = "Schemas, industry/geography hierarchies, revision schedules, and path config for NFP"
requires-python = ">=3.12"
license = {text = "MIT"}
dependencies = [
    "numpy>=1.24.0,<2.4",
    "polars>=0.20.0",
    "s3fs>=2026.4.0",
    "universal-pathlib>=0.3.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nfp_lookups"]
