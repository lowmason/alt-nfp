name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      # NOTE: CI has no store credentials (no .env / NFP_STORE_URI), so the
      # store-backed parity goldens — A1 (test_golden_masters), A2
      # (test_model_data_golden), and the real_store snapshot parity check —
      # all self-skip against the frozen reference. A green run here verifies
      # lint + logic, NOT posterior/array/store parity. (The synthetic snapshot
      # hash/round-trip tests do run; they are not parity goldens.)
      - name: Parity-gate transparency note
        run: |
          echo "NOTE: A1/A2/A3 parity goldens self-skip without store creds —"
          echo "a green CI check is NOT parity confirmation. Parity is verified"
          echo "only against the frozen reference with the store available."

      - name: Test (network tests excluded; store + parity-golden tests self-skip without creds)
        run: uv run pytest -m "not network" --no-cov
